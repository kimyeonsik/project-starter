name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: verify (node ${{ matrix.node }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Syntax-check all scripts
        shell: bash
        run: |
          for f in scripts/lib/util.mjs scripts/install.mjs scripts/uninstall.mjs scripts/verify.mjs skills/setup-secrets/setup-secrets.mjs; do
            node --check "$f"
          done

      # verify.mjs sandboxes install/uninstall in temp dirs with SKILL_BUNDLE=minimal,
      # so it needs no network and touches nothing outside the runner's temp space.
      - name: Run verification harness
        run: node scripts/verify.mjs
